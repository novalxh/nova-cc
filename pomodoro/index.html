<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>番茄钟</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      user-select: none;
    }

    .container {
      background: #16213e;
      border-radius: 24px;
      padding: 40px;
      width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }

    /* Mode tabs */
    .mode-tabs {
      display: flex;
      gap: 4px;
      background: #0f3460;
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 36px;
    }

    .mode-tab {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      background: transparent;
      color: #8892b0;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .mode-tab:hover { color: #e0e0e0; }
    .mode-tab.active {
      background: #1a1a2e;
      color: #fff;
    }

    .mode-tab[data-mode="focus"].active { color: #ff6b6b; }
    .mode-tab[data-mode="shortBreak"].active { color: #51cf66; }
    .mode-tab[data-mode="longBreak"].active { color: #5c7cfa; }

    /* Timer circle */
    .timer-wrapper {
      position: relative;
      width: 280px;
      height: 280px;
      margin: 0 auto 32px;
    }

    .timer-ring {
      transform: rotate(-90deg);
    }

    .timer-ring-bg {
      fill: none;
      stroke: #0f3460;
      stroke-width: 6;
    }

    .timer-ring-progress {
      fill: none;
      stroke: #ff6b6b;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dashoffset: 0;
      transition: stroke 0.4s ease;
    }

    .timer-inner {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .timer-display {
      font-size: 68px;
      font-weight: 700;
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      color: #fff;
      line-height: 1;
    }

    .timer-label {
      font-size: 14px;
      color: #8892b0;
      margin-top: 8px;
      letter-spacing: 2px;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .btn {
      padding: 12px 32px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #ff6b6b;
      color: #fff;
      min-width: 120px;
    }
    .btn-primary:hover { background: #ff5252; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary.running { background: #f59f00; }
    .btn-primary.running:hover { background: #f08c00; }

    .btn-secondary {
      background: #0f3460;
      color: #8892b0;
    }
    .btn-secondary:hover { background: #1a3a6e; color: #e0e0e0; }

    .btn-icon {
      padding: 12px 16px;
      background: #0f3460;
      border: none;
      border-radius: 12px;
      color: #8892b0;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-icon:hover { background: #1a3a6e; color: #e0e0e0; }

    /* Stats */
    .stats {
      display: flex;
      justify-content: center;
      gap: 32px;
      padding-top: 20px;
      border-top: 1px solid #0f3460;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 12px;
      color: #8892b0;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Mode tabs -->
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="focus">专注</button>
      <button class="mode-tab" data-mode="shortBreak">短休</button>
      <button class="mode-tab" data-mode="longBreak">长休</button>
    </div>

    <!-- Timer circle -->
    <div class="timer-wrapper">
      <svg class="timer-ring" width="280" height="280" viewBox="0 0 280 280">
        <circle class="timer-ring-bg" cx="140" cy="140" r="120" />
        <circle class="timer-ring-progress" id="progressRing" cx="140" cy="140" r="120" />
      </svg>
      <div class="timer-inner">
        <div class="timer-display" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">专注时间</div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" id="mainBtn">开始</button>
      <button class="btn btn-secondary" id="resetBtn">重置</button>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-item">
        <div class="stat-value" id="completedCount">0</div>
        <div class="stat-label">今日完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="cycleCount">1 / 4</div>
        <div class="stat-label">本轮进度</div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
