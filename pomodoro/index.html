<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>金维番茄钟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #121214;
        --surface: #1a1a1e;
        --text: #e8e6e0;
        --text-dim: #6b6a72;
        --accent: #e8614a;
        --radius: 16px;
      }

      body {
        font-family:
          'DM Sans',
          -apple-system,
          sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: var(--bg);
        color: var(--text);
        user-select: none;
        transition: background 0.6s ease;
      }

      .card {
        background: var(--surface);
        border-radius: var(--radius);
        padding: 48px 28px 40px;
        width: 440px;
        max-width: 94vw;
        text-align: center;
      }

      .tabs {
        display: flex;
        gap: 3px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        padding: 4px;
        margin-bottom: 46px;
      }

      .tab {
        flex: 1;
        padding: 10px 0;
        border: none;
        border-radius: 9px;
        background: transparent;
        color: var(--text-dim);
        font-size: 15px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition:
          color 0.25s,
          background 0.25s;
      }

      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        background: rgba(255, 255, 255, 0.07);
        color: var(--accent);
      }

      .timer-wrap {
        position: relative;
        width: 380px;
        height: 380px;
        margin: 0 auto 32px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .timer-ring {
        transform: rotate(-90deg);
      }

      .ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.06);
        stroke-width: 3;
      }

      .ring-progress {
        fill: none;
        stroke: var(--accent);
        stroke-width: 3;
        stroke-linecap: round;
        transition: stroke 0.5s ease;
      }

      .timer-inner {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .display {
        font-family: 'DM Mono', monospace;
        font-size: 78px;
        font-weight: 400;
        letter-spacing: 3px;
        font-variant-numeric: tabular-nums;
        line-height: 1;
      }

      .display.running {
        animation: pulse 2.5s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.55;
        }
      }

      .label {
        font-size: 16px;
        color: var(--accent);
        margin-top: 14px;
        letter-spacing: 6px;
        text-transform: uppercase;
        font-weight: 600;
        transition: color 0.5s ease;
      }

      .desc {
        font-size: 15px;
        color: var(--text-dim);
        margin-top: 10px;
        opacity: 0.6;
        transition: color 0.5s ease;
      }

      .controls {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-bottom: 24px;
      }

      .btn {
        border: none;
        border-radius: 40px;
        font-size: 16px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition:
          opacity 0.2s,
          background 0.2s;
      }

      .btn:active {
        opacity: 0.7;
      }

      .btn-primary {
        padding: 14px 0;
        background: var(--accent);
        color: #fff;
        width: 160px;
        transition:
          background 0.25s,
          width 0.3s;
      }

      .btn-primary.running {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text);
        width: 120px;
      }

      .btn-secondary {
        padding: 14px 24px;
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-dim);
      }

      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.09);
        color: var(--text);
      }

      .hint {
        font-size: 13px;
        color: var(--text-dim);
        letter-spacing: 1px;
        opacity: 0.35;
      }

      .hint kbd {
        display: inline-block;
        padding: 2px 7px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
        font-family: 'DM Mono', monospace;
        font-size: 12px;
      }

      @media (max-width: 420px) {
        .card {
          padding: 28px 20px 24px;
        }
        .timer-wrap {
          width: 300px;
          height: 300px;
        }
        .display {
          font-size: 62px;
        }
        .tabs {
          margin-bottom: 36px;
        }
        .btn-primary {
          width: 140px;
        }
        .btn-primary.running {
          width: 100px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="tabs">
        <button class="tab active" data-mode="focus">专注</button>
        <button class="tab" data-mode="shortBreak">短休</button>
        <button class="tab" data-mode="longBreak">长休</button>
      </div>

      <div class="timer-wrap">
        <svg class="timer-ring" width="240" height="240" viewBox="0 0 240 240">
          <circle class="ring-bg" cx="120" cy="120" r="105" />
          <circle class="ring-progress" id="progressRing" cx="120" cy="120" r="105" />
        </svg>
        <div class="timer-inner">
          <div class="display" id="timerDisplay">25:00</div>
          <div class="label" id="timerLabel">专注时间</div>
          <div class="desc" id="timerDesc">集中精力处理重要任务</div>
        </div>
      </div>

      <div class="controls">
        <button class="btn btn-primary" id="mainBtn">开始</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>

      <div class="hint"><kbd>Space</kbd> 开始/暂停 &nbsp;·&nbsp; <kbd>R</kbd> 重置</div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
