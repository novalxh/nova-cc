<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>番茄钟</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #121214;
        --surface: rgba(28, 28, 32, 0.85);
        --border: rgba(255, 255, 255, 0.06);
        --text-primary: #f0eee6;
        --text-secondary: #7a7882;
        --text-muted: #54525c;
        --accent: #e8614a;
        --accent-soft: rgba(232, 97, 74, 0.15);
        --radius: 24px;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'DM Sans',
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--bg);
        color: var(--text-primary);
        user-select: none;
        transition: background-color 0.8s ease;
      }

      /* 颗粒纹理叠加层 */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.35;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
        z-index: 999;
      }

      .container {
        position: relative;
        background: var(--surface);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border-radius: var(--radius);
        padding: 32px 40px 36px;
        width: 400px;
        box-shadow:
          0 24px 80px rgba(0, 0, 0, 0.6),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        text-align: center;
        border: 1px solid var(--border);
        z-index: 1;
      }

      /* ===== Mode Tabs ===== */
      .mode-tabs {
        display: flex;
        gap: 2px;
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        padding: 3px;
        margin-bottom: 40px;
      }

      .mode-tab {
        flex: 1;
        padding: 8px 0;
        border: none;
        border-radius: 10px;
        background: transparent;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 500;
        font-family: inherit;
        letter-spacing: 0.5px;
        cursor: pointer;
        transition: all 0.35s ease;
      }

      .mode-tab:hover {
        color: var(--text-secondary);
      }
      .mode-tab.active {
        background: rgba(255, 255, 255, 0.07);
        color: var(--accent);
      }

      /* ===== Timer ===== */
      .timer-wrapper {
        position: relative;
        width: 260px;
        height: 260px;
        margin: 0 auto 26px;
      }

      .timer-ring {
        transform: rotate(-90deg);
      }

      .timer-ring-bg {
        fill: none;
        stroke: rgba(255, 255, 255, 0.05);
        stroke-width: 3;
      }

      .timer-ring-progress {
        fill: none;
        stroke: var(--accent);
        stroke-width: 3;
        stroke-linecap: round;
        stroke-dashoffset: 0;
        transition: stroke 0.6s ease;
      }

      .timer-inner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
      }

      .timer-display {
        font-family: 'DM Mono', monospace;
        font-size: 76px;
        font-weight: 400;
        letter-spacing: 2px;
        font-variant-numeric: tabular-nums;
        color: var(--text-primary);
        line-height: 1;
        transition: color 0.5s ease;
      }

      .timer-display.running {
        animation: breathe 2.5s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.6;
        }
      }

      .timer-label {
        font-size: 12px;
        color: var(--text-muted);
        margin-top: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        transition: color 0.5s ease;
        font-weight: 500;
      }

      /* ===== Controls ===== */
      .controls {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 32px;
      }

      .btn {
        border: none;
        border-radius: 40px;
        font-size: 14px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.25s ease;
        letter-spacing: 0.5px;
      }

      .btn-primary {
        padding: 14px 0;
        background: var(--accent);
        color: #fff;
        width: 160px;
        box-shadow: 0 0 0 rgba(232, 97, 74, 0);
        transition:
          all 0.25s ease,
          box-shadow 0.4s ease;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        filter: brightness(1.08);
      }
      .btn-primary:active {
        transform: translateY(0);
        filter: brightness(0.95);
      }
      .btn-primary.running {
        background: rgba(255, 255, 255, 0.1);
        color: var(--text-primary);
        box-shadow: none;
        width: 110px;
      }
      .btn-primary.running:hover {
        background: rgba(255, 255, 255, 0.14);
        filter: none;
        box-shadow: none;
      }

      .btn-secondary {
        padding: 14px 22px;
        background: rgba(255, 255, 255, 0.04);
        color: var(--text-muted);
        min-width: 0;
      }
      .btn-secondary:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text-secondary);
      }

      .btn-secondary:disabled {
        opacity: 0.3;
        cursor: default;
        pointer-events: none;
      }

      /* ===== Keyboard hint ===== */
      .hint {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
        margin-bottom: 24px;
        opacity: 0.4;
        transition: opacity 0.3s ease;
      }
      .container:hover .hint {
        opacity: 0.7;
      }

      .hint kbd {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.06);
        font-family: 'DM Mono', monospace;
        font-size: 10px;
        color: var(--text-secondary);
      }

      /* ===== Stats ===== */
      .stats {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
      }

      .stat-completed {
        display: flex;
        align-items: baseline;
        gap: 6px;
      }

      .stat-completed .num {
        font-family: 'DM Mono', monospace;
        font-size: 20px;
        font-weight: 400;
        color: var(--text-primary);
        font-variant-numeric: tabular-nums;
      }

      .stat-completed .lbl {
        font-size: 12px;
        color: var(--text-muted);
        letter-spacing: 0.5px;
      }

      /* 圆点进度 */
      .cycle-track {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .cycle-track .lbl {
        font-size: 11px;
        color: var(--text-muted);
        letter-spacing: 1px;
        margin-right: 2px;
        text-transform: uppercase;
      }

      .cycle-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        transition: all 0.4s ease;
      }

      .cycle-dot.done {
        background: #4caf7d;
        box-shadow: 0 0 6px rgba(76, 175, 125, 0.3);
      }

      .cycle-dot.current {
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent-soft);
        transform: scale(1.4);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Mode tabs -->
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="focus">专注</button>
        <button class="mode-tab" data-mode="shortBreak">短休</button>
        <button class="mode-tab" data-mode="longBreak">长休</button>
      </div>

      <!-- Timer -->
      <div class="timer-wrapper">
        <svg class="timer-ring" width="260" height="260" viewBox="0 0 260 260">
          <circle class="timer-ring-bg" cx="130" cy="130" r="115" />
          <circle class="timer-ring-progress" id="progressRing" cx="130" cy="130" r="115" />
        </svg>
        <div class="timer-inner">
          <div class="timer-display" id="timerDisplay">25:00</div>
          <div class="timer-label" id="timerLabel">专注时间</div>
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <button class="btn btn-primary" id="mainBtn">开始</button>
        <button class="btn btn-secondary" id="resetBtn">重置</button>
      </div>

      <!-- Keyboard hint -->
      <div class="hint"><kbd>Space</kbd> 开始 / 暂停 &nbsp;·&nbsp; <kbd>R</kbd> 重置</div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat-completed">
          <span class="num" id="completedCount">0</span>
          <span class="lbl">完成</span>
        </div>
        <div class="cycle-track">
          <span class="lbl">进度</span>
          <span class="cycle-dots" id="cycleDots"></span>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
